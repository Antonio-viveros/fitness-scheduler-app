<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fitness Scheduler</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="app">

    <h1>🏋️ Fitness Scheduler</h1>

    <p class="subtitle">Plan your Monday–Friday workouts</p>

    <div class="days">
      <button>Mon</button>
      <button>Tue</button>
      <button>Wed</button>
      <button>Thu</button>
      <button>Fri</button>
    </div>

    <div class="panel">
      <h2>Today's Workout</h2>
      <p>No workouts added yet</p>
    </div>

    <div class="panel">
      <h2>Add Exercise</h2>

      <input placeholder="Exercise (e.g. Bench Press)" />
      <input placeholder="Sets" />
      <input placeholder="Reps" />

      <button class="add-btn">Add Workout</button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
